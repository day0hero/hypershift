clusterGroup:
  name: prod
  isHubCluster: true
  sharedValueFiles:
    - /values-hypershift.yaml

  namespaces:
    - vault
    - golang-external-secrets
    - multicluster-engine
    - ack-system

  operatorgroupExcludes:
    - ack-system

  subscriptions:
    mce:
      name: multicluster-engine
      namespace: multicluster-engine
      channel: stable-2.8
    
    s3:
      name: ack-s3-controller
      namespace: ack-system
      channel: alpha
      source: community-operators
    
  projects:
    - hub
    - hypershift
    - s3

  applications:
    vault:
      name: vault
      namespace: vault
      project: hub
      chart: hashicorp-vault
      chartVersion: 0.1.*

    golang-external-secrets:
      name: golang-external-secrets
      namespace: golang-external-secrets
      project: hub
      chart: golang-external-secrets
      chartVersion: 0.1.*

    hypershift:
      disabled: false
      name: hypershift
      namespace: multicluster-engine
      project: hypershift
      path: charts/all/hypershift

    oauth:
      disabled: false
      name: oauth
      namespace: openshift-config
      project: hub
      path: charts/all/oauth

    s3:
      disabled: false
      name: s3-controller
      namespace: ack-system
      project: s3
      path: charts/all/ack-s3

  imperative:
    namespace: imperative
    jobs:
    - name: hello-world
      # ansible playbook to be run
      playbook: rhvp.cluster_utils.hello_world
      # per playbook timeout in seconds
      timeout: 234
      # verbosity: "-v"

  managedClusterGroups:
    exampleRegion:
      name: group-one
      acmlabels:
      - name: clusterGroup
        value: group-one
      helmOverrides:
      - name: clusterGroup.isHubCluster
        value: false
