pipelineNamespace: cluster-provisioning

# Hub pattern may pass clusterGroup (namespaces, applications) for conditional behavior.
clusterGroup: {}

# klusterletAddon.enabled: explicit true/false overrides auto-detection below.
# When unset, create-klusterlet-addon runs only if clusterGroup lists ACM or the OCM namespace.
klusterletAddon: {}

serviceAccount:
  create: true
  name: provisioner
  namespace: cluster-provisioning

toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools
# Built by the hcp-cli chart and pushed to the internal registry
hcpImage: image-registry.openshift-image-registry.svc:5000/cluster-provisioning/hcp-cli:latest
awsCliImage: amazon/aws-cli:latest

externalSecrets:
  secretStore:
    name: vault-backend
    kind: ClusterSecretStore
  awsCreds:
    key: secret/data/hub/aws
  gcpCreds:
    key: secret/data/hub/gcp
  azureCreds:
    key: secret/data/hub/azure
  pullSecret:
    key: pushsecrets/global-pull-secret

hypershift:
  defaultReplicas: 2
  defaultInstanceType: m5.xlarge
  baseDomain: ""
  # Namespace of HostedCluster / NodePool CRs on the hub (OpenShift + HyperShift default).
  hostedClusterNamespace: clusters
  # destroy: finalizer task treats empty cluster-data-namespace as "cluster-<cluster-name>" on the hub.

hive:
  defaultControlPlaneReplicas: "3"
  defaultWorkerReplicas: "3"

# Build and push xrd-dashboard images (gateway, frontend, query, watch) to the internal registry.
xrdDashboardBuild:
  enabled: true
  # Namespace where ImageStreams are created and images are pushed (must match xrd-dashboard chart).
  targetNamespace: xrd-dashboard
  # Git repository containing Dockerfiles (override in PipelineRun or pattern values).
  gitUrl: ""
  gitRevision: main
  # Internal registry hostname (in-cluster pull path used by Deployments).
  internalRegistry: image-registry.openshift-image-registry.svc:5000
  imageTag: latest
  # Paths are relative to repository root after git clone.
  gatewayContext: gateway
  gatewayDockerfile: Dockerfile
  frontendContext: frontend
  frontendDockerfile: Dockerfile
  queryContext: query
  queryDockerfile: Dockerfile
  watchContext: watch
  watchDockerfile: Dockerfile
  # UBI image with git for clone step.
  gitBuilderImage: registry.redhat.io/ubi9/ubi:latest
  # Buildah image for bud/push (requires privileged step on many clusters).
  buildahImage: registry.redhat.io/ubi9/buildah:latest
  # When true, creates a PipelineRun on each sync (usually leave false; start runs from the console/CLI).
  samplePipelineRun: false
  # Required if samplePipelineRun is true — repository with gateway/, frontend/, query/, watch/ Dockerfiles.
  sampleGitUrl: ""
  sampleWorkspaceStorage: 5Gi
