apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrd-frontend
  namespace: xrd-dashboard
  labels:
    app: xrd-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.xrdDashboard.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: xrd-frontend
  template:
    metadata:
      labels:
        app: xrd-frontend
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        hostUsers: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ printf "%s/frontend:%s" .Values.xrdDashboard.imageRegistry .Values.xrdDashboard.imageTag }}
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /var/cache/nginx
              name: nginx-cache
            - mountPath: /var/run
              name: nginx-run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
