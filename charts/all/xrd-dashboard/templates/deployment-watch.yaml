apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrd-watch
  namespace: xrd-dashboard
  labels:
    app: xrd-watch
spec:
  replicas: {{ if .Values.xrdDashboard.workloadsSuspended }}0{{ else }}{{ .Values.xrdDashboard.replicaCount }}{{ end }}
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 10
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: xrd-watch
  template:
    metadata:
      labels:
        app: xrd-watch
    spec:
      serviceAccountName: xrd-watch
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watch
          image: {{ printf "%s/watch:%s" .Values.xrdDashboard.imageRegistry .Values.xrdDashboard.imageTag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
          env:
            - name: LEADER_ELECTION_NS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WATCH_CONFIG_PATH
              value: "/etc/xrd/resources.yaml"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8083
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8083
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /etc/xrd
              name: watch-config
              readOnly: true
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: kube-api-access
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: watch-config
          configMap:
            name: xrd-watch-resources
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
                  audience: "https://kubernetes.default.svc"
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
