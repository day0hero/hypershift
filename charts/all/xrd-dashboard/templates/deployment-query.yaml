apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrd-query
  namespace: xrd-dashboard
  labels:
    app: xrd-query
spec:
  replicas: {{ .Values.xrdDashboard.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: xrd-query
  template:
    metadata:
      labels:
        app: xrd-query
    spec:
      serviceAccountName: xrd-query
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        hostUsers: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: query
          image: {{ printf "%s/query:%s" .Values.xrdDashboard.imageRegistry .Values.xrdDashboard.imageTag }}
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: kube-api-access
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
                  audience: "https://kubernetes.default.svc"
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
