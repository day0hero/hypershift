# Images: push to image-registry.openshift-image-registry.svc:5000/xrd-dashboard/*
# (see openshift_dashboard pipeline) before sync, or ImagePullBackOff is expected.
xrdDashboard:
  imageRegistry: image-registry.openshift-image-registry.svc:5000/xrd-dashboard
  imageTag: latest
  replicaCount: 2
  # When true, all dashboard Deployments scale to 0 so Argo can be Healthy/Synced before images exist.
  workloadsSuspended: false
  # oauth-proxy cookie signing secret — must be stable across Argo syncs (override in prod).
  oauthSessionSecret: "dev-only-replace-with-openssl-rand-base64-32-in-values-overrides"
  # Namespaces where xrd-watch has list/watch via RoleBinding (must exist on the cluster).
  watchNamespaces: []
  hpa:
    # CPU metrics API is often empty until monitoring/user workloads exist; disable to avoid HPA errors.
    enabled: false
